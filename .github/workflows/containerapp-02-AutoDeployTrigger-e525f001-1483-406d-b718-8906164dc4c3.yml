name: Trigger auto deployment for containerapp-02

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/containerapp-02-AutoDeployTrigger-e525f001-1483-406d-b718-8906164dc4c3.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTAINERAPP02_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERAPP02_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERAPP02_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ziaregistry02.azurecr.io
          registryUsername: ${{ secrets.CONTAINERAPP02_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERAPP02_REGISTRY_PASSWORD }}
          containerAppName: containerapp-02
          resourceGroup: DefaultResourceGroup-CAU
          imageToBuild: ziaregistry02.azurecr.io/containerapp-02:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


