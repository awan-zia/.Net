name: Trigger auto deployment for containerapp-01

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/containerapp-01-AutoDeployTrigger-61ad161e-fcac-48b1-95da-5e7b1c10d59d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTAINERAPP01_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERAPP01_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERAPP01_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ziaregistory.azurecr.io
          registryUsername: ${{ secrets.CONTAINERAPP01_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERAPP01_REGISTRY_PASSWORD }}
          containerAppName: containerapp-01
          resourceGroup: Zia-RG-01
          imageToBuild: ziaregistory.azurecr.io/containerapp-01:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


